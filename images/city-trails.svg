<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8c4b8"/>
      <stop offset="60%" stop-color="#c4793a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c7a5c"/>
      <stop offset="100%" stop-color="#3d5a3d"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="300" fill="url(#dusk)"/>

  <!-- Sun setting -->
  <circle cx="340" cy="130" r="36" fill="#c4793a" opacity="0.85"/>
  <circle cx="340" cy="130" r="28" fill="#e8a060" opacity="0.7"/>

  <!-- Sun rays -->
  <line x1="340" y1="84" x2="340" y2="75" stroke="#e8a060" stroke-width="2" opacity="0.5"/>
  <line x1="366" y1="104" x2="373" y2="97" stroke="#e8a060" stroke-width="2" opacity="0.5"/>
  <line x1="376" y1="130" x2="385" y2="130" stroke="#e8a060" stroke-width="2" opacity="0.5"/>
  <line x1="366" y1="156" x2="373" y2="163" stroke="#e8a060" stroke-width="2" opacity="0.5"/>
  <line x1="314" y1="104" x2="307" y2="97" stroke="#e8a060" stroke-width="2" opacity="0.5"/>

  <!-- Chicago skyline buildings (silhouettes) -->
  <!-- Willis Tower -->
  <rect x="55" y="80" width="28" height="165" fill="#2d4a3e"/>
  <rect x="60" y="65" width="18" height="20" fill="#2d4a3e"/>
  <rect x="65" y="50" width="8" height="20" fill="#2d4a3e"/>
  <!-- Antenna -->
  <rect x="68" y="30" width="2" height="22" fill="#2d4a3e"/>

  <!-- John Hancock -->
  <polygon points="100,245 108,100 116,245" fill="#1a2e26"/>
  <rect x="108" y="88" width="2" height="15" fill="#1a2e26"/>
  <!-- cross braces -->
  <line x1="100" y1="160" x2="116" y2="130" stroke="#e8dcc8" stroke-width="0.8" opacity="0.3"/>
  <line x1="100" y1="130" x2="116" y2="160" stroke="#e8dcc8" stroke-width="0.8" opacity="0.3"/>
  <line x1="102" y1="200" x2="114" y2="175" stroke="#e8dcc8" stroke-width="0.8" opacity="0.3"/>
  <line x1="102" y1="175" x2="114" y2="200" stroke="#e8dcc8" stroke-width="0.8" opacity="0.3"/>

  <!-- Mid buildings -->
  <rect x="120" y="150" width="22" height="95" fill="#2d4a3e"/>
  <rect x="145" y="130" width="18" height="115" fill="#345a4a"/>
  <rect x="166" y="160" width="14" height="85" fill="#2d4a3e"/>
  <rect x="182" y="140" width="20" height="105" fill="#1a3528"/>

  <!-- Right buildings -->
  <rect x="205" y="155" width="16" height="90" fill="#2d4a3e"/>
  <rect x="223" y="135" width="22" height="110" fill="#3d6a56" opacity="0.8"/>
  <rect x="247" y="165" width="18" height="80" fill="#2d4a3e"/>
  <rect x="267" y="148" width="14" height="97" fill="#1a3528"/>

  <!-- Building windows (dots of light) -->
  <rect x="60" y="100" width="3" height="2" fill="#e8dcc8" opacity="0.4"/>
  <rect x="66" y="100" width="3" height="2" fill="#e8dcc8" opacity="0.4"/>
  <rect x="72" y="100" width="3" height="2" fill="#e8dcc8" opacity="0.4"/>
  <rect x="60" y="110" width="3" height="2" fill="#e8dcc8" opacity="0.3"/>
  <rect x="72" y="110" width="3" height="2" fill="#e8dcc8" opacity="0.5"/>
  <rect x="60" y="120" width="3" height="2" fill="#e8dcc8" opacity="0.4"/>
  <rect x="66" y="120" width="3" height="2" fill="#e8dcc8" opacity="0.2"/>
  <rect x="128" y="165" width="2" height="2" fill="#e8c870" opacity="0.5"/>
  <rect x="134" y="165" width="2" height="2" fill="#e8c870" opacity="0.4"/>
  <rect x="128" y="175" width="2" height="2" fill="#e8c870" opacity="0.3"/>
  <rect x="152" y="145" width="2" height="2" fill="#e8c870" opacity="0.5"/>
  <rect x="158" y="145" width="2" height="2" fill="#e8c870" opacity="0.4"/>

  <!-- Ground / trail area -->
  <rect x="0" y="245" width="400" height="55" fill="url(#ground)"/>

  <!-- Trail / path -->
  <path d="M0,265 Q100,258 200,262 Q300,266 400,260" stroke="#e8dcc8" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M0,270 Q100,263 200,267 Q300,271 400,265" stroke="#e8dcc8" stroke-width="3" fill="none" opacity="0.3"/>

  <!-- Path dashes (center line) -->
  <line x1="30" y1="267" x2="55" y2="266" stroke="#c4793a" stroke-width="1.5" stroke-dasharray="8,12" opacity="0.6"/>
  <line x1="80" y1="266" x2="105" y2="265" stroke="#c4793a" stroke-width="1.5" stroke-dasharray="8,12" opacity="0.6"/>
  <line x1="130" y1="265" x2="155" y2="265" stroke="#c4793a" stroke-width="1.5" stroke-dasharray="8,12" opacity="0.6"/>
  <line x1="180" y1="265" x2="205" y2="265" stroke="#c4793a" stroke-width="1.5" stroke-dasharray="8,12" opacity="0.6"/>
  <line x1="230" y1="265" x2="255" y2="265" stroke="#c4793a" stroke-width="1.5" stroke-dasharray="8,12" opacity="0.6"/>
  <line x1="280" y1="265" x2="305" y2="265" stroke="#c4793a" stroke-width="1.5" stroke-dasharray="8,12" opacity="0.6"/>
  <line x1="330" y1="265" x2="360" y2="265" stroke="#c4793a" stroke-width="1.5" stroke-dasharray="8,12" opacity="0.6"/>

  <!-- Cyclist silhouette -->
  <!-- Wheels -->
  <circle cx="172" cy="253" r="10" fill="none" stroke="#1a2e26" stroke-width="2.5"/>
  <circle cx="195" cy="253" r="10" fill="none" stroke="#1a2e26" stroke-width="2.5"/>
  <!-- Frame -->
  <line x1="172" y1="253" x2="184" y2="238" stroke="#1a2e26" stroke-width="2.5"/>
  <line x1="184" y1="238" x2="195" y2="253" stroke="#1a2e26" stroke-width="2.5"/>
  <line x1="184" y1="238" x2="178" y2="240" stroke="#1a2e26" stroke-width="2.5"/>
  <line x1="178" y1="240" x2="172" y2="253" stroke="#1a2e26" stroke-width="2.5"/>
  <!-- Handlebar -->
  <line x1="184" y1="238" x2="192" y2="234" stroke="#1a2e26" stroke-width="2"/>
  <line x1="192" y1="234" x2="193" y2="238" stroke="#1a2e26" stroke-width="1.5"/>
  <!-- Seat -->
  <line x1="184" y1="238" x2="181" y2="234" stroke="#1a2e26" stroke-width="2"/>
  <line x1="179" y1="234" x2="184" y2="234" stroke="#1a2e26" stroke-width="2"/>
  <!-- Rider body -->
  <ellipse cx="186" cy="228" rx="5" ry="7" fill="#1a2e26"/>
  <!-- Head -->
  <circle cx="190" cy="220" r="5" fill="#1a2e26"/>
  <!-- Helmet -->
  <path d="M185,218 Q190,212 195,218" fill="#c4793a"/>

  <!-- Trees along path -->
  <circle cx="30" cy="238" r="14" fill="#3d6a56"/>
  <rect x="28" y="248" width="4" height="12" fill="#4a3020"/>
  <circle cx="370" cy="240" r="12" fill="#3d6a56"/>
  <rect x="368" y="250" width="4" height="10" fill="#4a3020"/>
  <circle cx="310" cy="242" r="10" fill="#4a7a64"/>
  <rect x="308" y="250" width="4" height="10" fill="#4a3020"/>
</svg>
