  <ellipse cx="145" cy="213" rx="8" ry="3" fill="#7a6040" transform="rotate(-20,145,213)"/>
  <!-- Paddle right -->
  <line x1="190" y1="198" x2="232" y2="212" stroke="#5c4a32" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="235" cy="213" rx="8" ry="3" fill="#7a6040" transform="rotate(20,235,213)"/>

