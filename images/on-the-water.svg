  <ellipse cx="190" cy="220" rx="80" ry="7" fill="none" stroke="#5a8a9a" stroke-width="0.8" opacity="0.3"/>

  <!-- Bird silhouettes -->
  <path d="M50,80 Q55,76 60,80" stroke="#1a3040" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M62,75 Q67,71 72,75" stroke="#1a3040" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M20,95 Q25,91 30,95" stroke="#1a3040" stroke-width="1.5" fill="none" opacity="0.4"/>
