  <rect x="87" y="140" width="2" height="2" fill="#a8c4b8" opacity="0.5"/>
  <rect x="91" y="140" width="2" height="2" fill="#a8c4b8" opacity="0.4"/>
  <rect x="103" y="128" width="2" height="2" fill="#e8c870" opacity="0.5"/>
  <rect x="107" y="128" width="2" height="2" fill="#e8c870" opacity="0.3"/>
  <rect x="148" y="132" width="2" height="2" fill="#a8c4b8" opacity="0.4"/>
