  <path d="M225,207 Q235,204 245,208" stroke="#a86828" stroke-width="1.5" fill="none"/>

  <!-- Paddler -->
  <!-- Body -->
  <ellipse cx="190" cy="200" rx="8" ry="10" fill="#2d4a3e"/>
  <!-- Head -->
  <circle cx="190" cy="190" r="7" fill="#c4a080"/>
  <!-- Hat -->
