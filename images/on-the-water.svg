  <circle cx="340" cy="60" r="22" fill="#e8c870" opacity="0.9"/>
  <circle cx="340" cy="60" r="16" fill="#f0d870" opacity="0.8"/>

  <!-- Skyline reflection area -->
  <!-- Buildings silhouette -->
  <rect x="80" y="130" width="16" height="65" fill="#1a3040" opacity="0.85"/>
