<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="waterSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8c4b8"/>
      <stop offset="100%" stop-color="#7aacb8"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7a8a"/>
      <stop offset="100%" stop-color="#2d5a6e"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="300" fill="url(#waterSky)"/>

