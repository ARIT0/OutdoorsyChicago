  <rect x="158" y="130" width="12" height="65" fill="#1a3040" opacity="0.85"/>
  <rect x="172" y="118" width="10" height="77" fill="#2d4a5e" opacity="0.85"/>
  <rect x="184" y="128" width="14" height="67" fill="#1a3040" opacity="0.8"/>
  <rect x="200" y="135" width="10" height="60" fill="#2d4a5e" opacity="0.75"/>
  <rect x="212" y="125" width="12" height="70" fill="#1a3040" opacity="0.8"/>
